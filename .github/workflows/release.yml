name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download package zip artifact
        uses: actions/download-artifact@v8
        with:
          # archive:false artifacts must be fetched by their exact name (= file name);
          # skip-decompress keeps the .zip as-is instead of auto-extracting it.
          name: gh-hugepage-reserve-${{ needs.build.outputs.ver }}.zip
          path: dl
          skip-decompress: true

      - name: Locate zip
        id: f
        run: |
          set -e
          zip="dl/gh-hugepage-reserve-${{ needs.build.outputs.ver }}.zip"
          if [ ! -f "$zip" ]; then
            echo "::error::no packaged zip found at $zip"
            ls -lR dl || true
            exit 1
          fi
          echo "zip=$zip" >> "$GITHUB_OUTPUT"
          ls -lh "$zip"

      - name: Publish release (overwrite if exists)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }} (module ${{ needs.build.outputs.ver }})
          body: |
            gh_hugepage_reserve release.

            - module version: `${{ needs.build.outputs.ver }}`
            - tag: `${{ github.ref_name }}`
            - commit: ${{ github.sha }}

            Flash `gh-hugepage-reserve.zip` in Magisk/KernelSU
            (per-kernel .ko are inside the zip).
          files: ${{ steps.f.outputs.zip }}
